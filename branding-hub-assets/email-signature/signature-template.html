<title>BlueTec email signature — template</title>

<!--
  BlueTec email signature template.
  HOW TO USE: edit the five fields marked [EDIT], then copy/paste the signature block
  into Outlook / Gmail signature settings. Email clients cannot load custom fonts, so
  this uses Arial as the safe fallback (closest system match to BlueTec Geometric).
  The emblem is inline SVG so it travels with the signature — no hosting required.
  On the hub, turn the [EDIT] fields into form inputs that write into this markup.
-->

  <!-- ===== SIGNATURE BLOCK (copy from here) ===== -->
  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse">
    <tr>
      <!-- emblem -->
      <td style="vertical-align:top;padding-right:18px">

      </td>
      <!-- divider -->
      <td style="vertical-align:top;padding-right:18px">
        <div style="width:3px;height:56px;background:#0077C8;line-height:1px;font-size:1px">&nbsp;</div>
      </td>
      <!-- text -->
      <td style="vertical-align:top">
        <div style="font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:bold;color:#15151A;letter-spacing:.2px">[EDIT: Full name]</div>
        <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#5a5a55;margin-top:2px">[EDIT: Role]</div>
        <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#5a5a55;margin-top:8px;line-height:1.6">
          <a href="mailto:[EDIT: email]" style="color:#0077C8;text-decoration:none">[EDIT: email]</a>&nbsp;&middot;&nbsp;[EDIT: phone]<br>
